<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Palette Inspector</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1c1f25;
    --panel-2: #23272f;
    --line: #2e333d;
    --text: #e7e9ee;
    --muted: #9aa1ad;
    --accent: #6fb3ff;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--line);
  }
  h1 { margin: 0 0 4px; font-size: 20px; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 13px; }
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* Drop zone */
  .drop {
    border: 2px dashed var(--line);
    border-radius: var(--radius);
    padding: 34px 20px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s;
    margin-bottom: 22px;
  }
  .drop:hover, .drop.over {
    border-color: var(--accent);
    color: var(--text);
    background: var(--panel);
  }
  .drop strong { color: var(--text); }
  .drop input { display: none; }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .toolbar.empty { display: none; }
  button.btn {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 7px 13px;
    font-size: 13px;
    cursor: pointer;
  }
  button.btn:hover { border-color: var(--accent); }
  .count { color: var(--muted); font-size: 13px; margin-left: auto; }

  /* Palette grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card-head {
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--line);
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 2px;
    word-break: break-word;
  }
  .card-file { font-size: 12px; color: var(--muted); word-break: break-all; }
  .card-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .card-comment {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-top: 8px;
    white-space: pre-wrap;
    line-height: 1.45;
  }

  /* Ramp strip */
  .ramp { display: flex; height: 44px; }
  .ramp .sw { flex: 1; cursor: pointer; }

  /* Swatch rows */
  .rows { display: flex; flex-direction: column; }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 16px;
    border-top: 1px solid var(--line);
    cursor: pointer;
  }
  .row:hover { background: var(--panel-2); }
  .chip {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    flex: none;
    border: 1px solid rgba(255,255,255,.12);
  }
  .row-info { min-width: 0; flex: 1; }
  .row-name { font-size: 13px; }
  .row-hex {
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
  }
  .row-rgb {
    font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--muted);
    flex: none;
  }
  .err {
    background: #3a1f22;
    border-color: #5b2b30;
    color: #ffd9dc;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
  }
  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #06121f;
    font-weight: 600;
    font-size: 13px;
    padding: 9px 16px;
    border-radius: 8px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>Palette Inspector</h1>
  <div class="sub">Drop GIMP <code>.gpl</code> palette files to inspect colors, names, and metadata. Everything runs locally in your browser. Click any swatch to copy its hex.</div>
</header>

<main>
  <label class="drop" id="drop">
    <strong>Drop .gpl files here</strong> or click to browse. Multiple at once is fine.
    <input type="file" id="file" accept=".gpl,text/plain" multiple>
  </label>

  <div class="toolbar empty" id="toolbar">
    <button class="btn" id="clear">Clear all</button>
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="grid"></div>
</main>

<div class="toast" id="toast">Copied</div>

<script>
(function () {
  "use strict";

  var grid = document.getElementById("grid");
  var fileInput = document.getElementById("file");
  var drop = document.getElementById("drop");
  var toolbar = document.getElementById("toolbar");
  var countEl = document.getElementById("count");
  var palettes = [];

  function toHex(r, g, b) {
    function h(n) { return ("0" + n.toString(16)).slice(-2); }
    return "#" + h(r) + h(g) + h(b);
  }
  function luminance(r, g, b) {
    return 0.2126 * r + 0.7152 * g + 0.0722 * b;
  }

  // Parse a GIMP .gpl file.
  function parseGpl(text, filename) {
    var lines = text.split(/\r?\n/);
    if (!/^GIMP Palette/i.test(lines[0] || "")) {
      throw new Error("Not a GIMP palette (missing header)");
    }
    var name = filename;
    var columns = null;
    var comments = [];
    var colors = [];
    for (var i = 1; i < lines.length; i++) {
      var line = lines[i];
      if (!line.trim()) continue;
      var m;
      if ((m = line.match(/^Name:\s*(.*)$/i))) { name = m[1].trim(); continue; }
      if ((m = line.match(/^Columns:\s*(\d+)/i))) { columns = parseInt(m[1], 10); continue; }
      if (line.charAt(0) === "#") { comments.push(line.replace(/^#\s?/, "")); continue; }
      // Color row: R G B  optional name
      m = line.match(/^\s*(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s*(.*)$/);
      if (m) {
        var r = +m[1], g = +m[2], b = +m[3];
        if (r > 255 || g > 255 || b > 255) continue;
        colors.push({ r: r, g: g, b: b, name: (m[4] || "").trim() });
      }
    }
    return { name: name, file: filename, columns: columns, comments: comments, colors: colors };
  }

  function el(tag, cls, txt) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (txt != null) e.textContent = txt;
    return e;
  }

  var toast = document.getElementById("toast");
  var toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 1100);
  }
  function copy(text) {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function () { showToast("Copied " + text); });
    } else {
      var ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); showToast("Copied " + text); } catch (e) {}
      document.body.removeChild(ta);
    }
  }

  function renderCard(p) {
    var card = el("div", "card");

    var head = el("div", "card-head");
    head.appendChild(el("div", "card-name", p.name));
    head.appendChild(el("div", "card-file", p.file));
    var meta = el("div", "card-meta",
      p.colors.length + " color" + (p.colors.length === 1 ? "" : "s") +
      (p.columns ? "  ·  " + p.columns + " columns" : ""));
    head.appendChild(meta);
    if (p.comments.length) {
      head.appendChild(el("div", "card-comment", p.comments.join("\n")));
    }
    card.appendChild(head);

    // Ramp strip
    var ramp = el("div", "ramp");
    p.colors.forEach(function (c) {
      var hex = toHex(c.r, c.g, c.b);
      var sw = el("div", "sw");
      sw.style.background = hex;
      sw.title = hex + (c.name ? "  " + c.name : "");
      sw.addEventListener("click", function () { copy(hex); });
      ramp.appendChild(sw);
    });
    card.appendChild(ramp);

    // Rows
    var rows = el("div", "rows");
    p.colors.forEach(function (c) {
      var hex = toHex(c.r, c.g, c.b);
      var row = el("div", "row");
      var chip = el("div", "chip");
      chip.style.background = hex;
      row.appendChild(chip);
      var info = el("div", "row-info");
      if (c.name) info.appendChild(el("div", "row-name", c.name));
      info.appendChild(el("div", "row-hex", hex));
      row.appendChild(info);
      row.appendChild(el("div", "row-rgb", c.r + ", " + c.g + ", " + c.b));
      row.addEventListener("click", function () { copy(hex); });
      rows.appendChild(row);
    });
    card.appendChild(rows);

    return card;
  }

  function renderError(filename, msg) {
    var card = el("div", "card");
    var head = el("div", "card-head");
    head.appendChild(el("div", "card-name", filename));
    card.appendChild(head);
    var e = el("div", "err", "Could not parse: " + msg);
    e.style.margin = "12px";
    card.appendChild(e);
    return card;
  }

  function render() {
    grid.innerHTML = "";
    palettes.forEach(function (p) {
      grid.appendChild(p.error ? renderError(p.file, p.error) : renderCard(p));
    });
    var ok = palettes.filter(function (p) { return !p.error; }).length;
    countEl.textContent = ok + " palette" + (ok === 1 ? "" : "s") + " loaded";
    toolbar.classList.toggle("empty", palettes.length === 0);
  }

  function addFiles(fileList) {
    var files = Array.prototype.slice.call(fileList);
    files.forEach(function (f) {
      var reader = new FileReader();
      reader.onload = function () {
        try {
          palettes.push(parseGpl(reader.result, f.name));
        } catch (err) {
          palettes.push({ file: f.name, error: err.message });
        }
        render();
      };
      reader.readAsText(f);
    });
  }

  fileInput.addEventListener("change", function () {
    addFiles(fileInput.files);
    fileInput.value = "";
  });

  ["dragenter", "dragover"].forEach(function (ev) {
    drop.addEventListener(ev, function (e) {
      e.preventDefault(); e.stopPropagation();
      drop.classList.add("over");
    });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    drop.addEventListener(ev, function (e) {
      e.preventDefault(); e.stopPropagation();
      drop.classList.remove("over");
    });
  });
  drop.addEventListener("drop", function (e) {
    if (e.dataTransfer && e.dataTransfer.files) addFiles(e.dataTransfer.files);
  });
  // Allow dropping anywhere on the page too.
  window.addEventListener("dragover", function (e) { e.preventDefault(); });
  window.addEventListener("drop", function (e) {
    e.preventDefault();
    if (e.target.closest && e.target.closest(".drop")) return;
    if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  });

  document.getElementById("clear").addEventListener("click", function () {
    palettes = [];
    render();
  });
})();
</script>
</body>
</html>
